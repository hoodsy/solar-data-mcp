[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "anyio>=4",
    "ruff>=0.8",
    "mypy>=1.13",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]
mypy_path = [
    "packages/core/src",
    "packages/nrel-solar/src",
    "packages/core/tests",
    "packages/nrel-solar/tests",
]
files = [
    "packages/core/src",
    "packages/nrel-solar/src",
    "packages/core/tests",
    "packages/nrel-solar/tests",
    "conftest.py",
    "examples",
]
explicit_package_bases = true

[tool.pytest.ini_options]
testpaths = ["packages/core/tests", "packages/nrel-solar/tests"]

# Coverage is a CI gate (`pytest --cov=solar_mcp_core --cov=solar_mcp_nrel`),
# not welded onto every local run — `pytest -k one_test` stays usable.
[tool.coverage.report]
fail_under = 85
show_missing = true
