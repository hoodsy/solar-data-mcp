name: Release

# Publishes all six packages to PyPI via Trusted Publishing (OIDC) — no
# long-lived API token is stored in the repo. Triggered by pushing a version
# tag (e.g. `v0.1.0`). One-time setup: register this repo + workflow +
# environment as a trusted publisher for each of the six project names on PyPI
# (https://docs.pypi.org/trusted-publishers/), and create the `pypi` environment
# in GitHub repo settings.

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv build --all-packages
      # Publish dependencies (core + four domain servers) first, then the
      # umbrella, so `uvx solar-data-mcp` can always resolve its deps.
      - name: Stage the umbrella package separately
        run: |
          mkdir -p dist-umbrella
          mv dist/solar_data_mcp-[0-9]*.whl dist/solar_data_mcp-[0-9]*.tar.gz dist-umbrella/
      - name: Publish core + domain packages
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
      - name: Publish the umbrella package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-umbrella/
