name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
        task: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      # --frozen: install exactly the committed uv.lock; a drifted lock fails CI
      # so the audited dependency set is what actually ships.
      - run: uv sync --all-packages --frozen
      # Tests are replay-only: fixtures/<source>/ answers every request
      # in-process, and no API-key secrets exist in CI, so live calls are impossible.
      - run: |
          case "${{ matrix.task }}" in
            lint) uv run ruff check . && uv run ruff format --check . ;;
            typecheck) uv run mypy ;;
            test) uv run pytest --cov=solar_mcp_core --cov=solar_mcp_nrel --cov=solar_mcp_economics --cov=solar_mcp_market --cov=solar_mcp_forecast --cov=solar_data_mcp ;;
          esac

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv build --all-packages
      - run: uvx twine check dist/*
