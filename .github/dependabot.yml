version: 2
updates:
  # Python dependencies across the uv workspace (reads pyproject + uv.lock).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]
  # Keep the pinned GitHub Actions (checkout, setup-uv, pypi-publish) current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
