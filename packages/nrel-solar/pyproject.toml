[project]
name = "solar-data-mcp-nrel"
version = "0.1.1"
description = "MCP server for NREL solar APIs: PVWatts v8 production estimates and NSRDB solar resource data"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Logan Bernard" }]
keywords = ["solar", "mcp", "nrel", "pvwatts", "nsrdb", "open-data"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "solar-data-mcp-core>=0.1,<0.2",
    "mcp>=1.26,<2",
    "httpx>=0.27,<1",
    "pydantic>=2.7,<3",
]

[project.urls]
Homepage = "https://github.com/hoodsy/solar-data-mcp"

[project.scripts]
nrel-solar-mcp = "solar_mcp_nrel.server:main"

[tool.uv.sources]
solar-data-mcp-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/solar_mcp_nrel"]
