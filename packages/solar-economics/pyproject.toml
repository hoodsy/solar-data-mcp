[project]
name = "solar-data-mcp-economics"
version = "0.1.0"
description = "MCP server for solar economics: retail tariffs (OpenEI URDB), electricity prices (EIA), incentives (DSIRE), and auditable ROI estimates"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Logan Bernard" }]
keywords = ["solar", "mcp", "urdb", "eia", "dsire", "roi", "open-data"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "solar-data-mcp-core>=0.1,<0.2",
    "solar-data-mcp-nrel>=0.1,<0.2",
    "mcp>=1.26,<2",
    "httpx>=0.27",
    "pydantic>=2.7",
    "duckdb>=1.1",
]

[project.urls]
Homepage = "https://github.com/hoodsy/solar-data-mcp"

[project.scripts]
solar-economics-mcp = "solar_mcp_economics.server:main"

[tool.uv.sources]
solar-data-mcp-core = { workspace = true }
solar-data-mcp-nrel = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/solar_mcp_economics"]
