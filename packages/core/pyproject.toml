[project]
name = "solar-mcp-core"
version = "0.1.0"
description = "Shared infrastructure for solar-data-mcp servers: HTTP client, cache, rate limiting, result envelope"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Logan Bernard" }]
keywords = ["solar", "mcp", "nrel", "open-data"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
]

[project.urls]
Homepage = "https://github.com/loganbernard/solar-data-mcp"

[project.scripts]
solar-mcp = "solar_mcp_core.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/solar_mcp_core"]
